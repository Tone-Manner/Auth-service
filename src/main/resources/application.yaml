server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    # MySQL
    url: jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: 1111
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

