server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    # MySQL
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db?serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1111}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# JWT custom setting
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-local-development-test-12345}
  expiration: 3600000